<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Follow Matcher</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: radial-gradient(circle at top, #1a102f, #05020a);
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glow-btn {
      position: relative;
      transition: all 0.3s ease;
    }
    .glow-btn:hover {
      box-shadow: 0 0 20px rgba(236, 72, 153, 0.6);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="absolute top-4 right-4 glass px-4 py-2 rounded-full flex items-center gap-2 text-pink-400 font-bold shadow-lg">
    <i class="fa-solid fa-coins"></i>
    <span>পয়েন্ট: <span id="my-points">০</span></span>
  </div>

  <div class="w-full max-w-md glass rounded-3xl p-6 shadow-2xl relative overflow-hidden">
    
    <div class="absolute -top-10 -left-10 w-32 h-32 bg-pink-500 rounded-full blur-[80px] opacity-30"></div>
    <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-purple-500 rounded-full blur-[80px] opacity-30"></div>

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-pink-500 to-purple-600 shadow-lg text-2xl mb-3">
        <i class="fa-brands fa-tiktok text-white animate-bounce"></i>
      </div>
      <h1 class="text-2xl font-black bg-gradient-to-r from-pink-400 to-purple-400 bg-clip-text text-transparent">TikTok Follow Matcher</h1>
      <p class="text-xs text-gray-400 mt-1">একে অপরকে ফলো করুন এবং পয়েন্ট জিতুন!</p>
    </div>

    <div id="screen-login" class="space-y-4">
      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-300 block">আপনার টিকটক ইউজারনেম দিন</label>
        <div class="relative">
          <span class="absolute left-4 top-3.5 text-gray-500">@</span>
          <input type="text" id="tiktok-input" placeholder="username" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 pl-9 pr-4 text-white focus:outline-none focus:border-pink-500 transition-all text-sm">
        </div>
      </div>
      <button id="login-btn" onclick="loginUser()" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold py-3 rounded-xl glow-btn cursor-pointer">
        এগিয়ে যান <i class="fa-solid fa-arrow-right ml-1"></i>
      </button>
    </div>

    <div id="screen-lobby" class="hidden text-center space-y-6 py-4">
      <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
        <p class="text-sm text-gray-400">স্বাগতম, <span id="display-name" class="text-white font-semibold"></span></p>
      </div>
      <button onclick="startMatching()" class="w-36 h-36 rounded-full bg-gradient-to-tr from-pink-500 to-purple-600 text-white font-black text-xl shadow-lg glow-btn mx-auto flex flex-col items-center justify-center cursor-pointer border-4 border-white/10">
        <i class="fa-solid fa-play text-2xl mb-1"></i>
        PLAY
      </button>
      <p class="text-xs text-gray-500 animate-pulse hidden" id="searching-text">অন্য প্লেয়ার খোঁজা হচ্ছে...</p>
    </div>

    <div id="screen-match" class="hidden space-y-6">
      
      <div class="grid grid-cols-2 gap-4 text-center">
        <div class="p-4 bg-white/5 rounded-2xl border border-white/10">
          <div class="text-xs text-gray-400 uppercase tracking-wider mb-1" id="p1-label">PLAYER 1</div>
          <div class="font-bold text-pink-400 truncate" id="p1-name">@you</div>
        </div>
        <div class="p-4 bg-pink-500/10 rounded-2xl border border-pink-500/20">
          <div class="text-xs text-pink-300 uppercase tracking-wider mb-1" id="p2-label">PLAYER 2</div>
          <div class="font-bold text-purple-400 truncate" id="p2-name">@opponent</div>
        </div>
      </div>

      <div class="text-center py-2" id="visit-action-area">
        <p class="text-xs text-gray-400 mb-2">নিচের বাটনে ক্লিক করে বিপক্ষকে ফলো করুন:</p>
        <a id="tiktok-link" href="#" target="_blank" class="inline-flex items-center gap-2 bg-black px-6 py-3 rounded-xl font-bold text-sm border border-white/20 hover:border-pink-500 transition-all">
          <i class="fa-brands fa-tiktok text-pink-500"></i> প্রোফাইল ভিজিট করুন
        </a>
      </div>

      <div class="border-t border-white/5 my-4"></div>

      <div class="space-y-4" id="action-buttons">
        <div>
          <button id="btn-submit-follow" onclick="clickFollowed()" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-900/40 disabled:text-gray-500 font-bold py-3 rounded-xl transition-all shadow-md cursor-pointer">
            <i class="fa-solid fa-check-double mr-1"></i> আমি ফলো করেছি
          </button>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button id="btn-recv-yes" onclick="clickReceived(true)" class="bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-900/40 disabled:text-gray-500 font-bold py-3 rounded-xl transition-all text-sm shadow-md cursor-pointer">
            <i class="fa-solid fa-thumbs-up mr-1"></i> ফলো পেয়েছি
          </button>
          <button id="btn-recv-no" onclick="clickReceived(false)" class="bg-rose-600 hover:bg-rose-700 disabled:bg-rose-900/40 disabled:text-gray-500 font-bold py-3 rounded-xl transition-all text-sm shadow-md cursor-pointer">
            <i class="fa-solid fa-user-xmark mr-1"></i> ফলো পাইনি
          </button>
        </div>
      </div>

      <p id="match-status-text" class="text-center text-xs text-yellow-400 bg-yellow-500/10 py-2 rounded-lg border border-yellow-500/20"></p>

    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDgFaTrHW7Grp_Q22p6KNcHZxaEujHsLsE",
      authDomain: "exchange-project-d4028.firebaseapp.com",
      databaseURL: "https://exchange-project-d4028-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "exchange-project-d4028",
      storageBucket: "exchange-project-d4028.firebasestorage.app",
      messagingSenderId: "313976742479",
      appId: "1:313976742479:web:45951b360d875c4768c03a",
      measurementId: "G-PQMFYZS958"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let myId = ""; 
    let myTikTok = "";
    let myPoints = 0; 
    let currentMatchId = null;
    let myRole = ""; 
    let matchListenerRef = null;

    function showScreen(screenId) {
      document.getElementById('screen-login').classList.add('hidden');
      document.getElementById('screen-lobby').classList.add('hidden');
      document.getElementById('screen-match').classList.add('hidden');
      document.getElementById(screenId).classList.remove('hidden');
    }

    function loginUser() {
      const input = document.getElementById('tiktok-input').value.trim();
      if(!input) return alert("অনুগ্রহ করে টিকটক ইউজারনেম দিন!");
      
      myId = input.replace(/[\.\#\$\[\]]/g, "").toLowerCase();
      myTikTok = input;

      const loginBtn = document.getElementById('login-btn');
      loginBtn.innerText = "লোডিং...";
      loginBtn.disabled = true;

      const userRef = database.ref('users/' + myId);

      userRef.once('value').then((snapshot) => {
        if (snapshot.exists()) {
          myPoints = snapshot.val().points;
        } else {
          myPoints = 10;
          userRef.set({
            tiktokId: myTikTok,
            points: myPoints
          });
        }

        document.getElementById('display-name').innerText = "@" + myTikTok;
        document.getElementById('my-points').innerText = myPoints;
        showScreen('screen-lobby');
      }).catch((error) => {
        alert("ত্রুটি ঘটেছে: " + error.message);
      }).finally(() => {
        loginBtn.innerText = "এগিয়ে যান";
        loginBtn.disabled = false;
      });
    }

    function updateUserPointsInDB(newPoints) {
      myPoints = newPoints;
      document.getElementById('my-points').innerText = myPoints;
      database.ref('users/' + myId).update({ points: myPoints });
    }

    function startMatching() {
      document.getElementById('searching-text').innerText = "অন্য প্লেয়ার খোঁজা হচ্ছে...";
      document.getElementById('searching-text').classList.remove('hidden');
      const queueRef = database.ref('queue');

      queueRef.once('value', (snapshot) => {
        if (snapshot.exists()) {
          const queueData = snapshot.val();
          const opponentId = Object.keys(queueData)[0];
          const opponentData = queueData[opponentId];

          if (opponentId === myId) {
             document.getElementById('searching-text').innerText = "আপনি ইতিমধ্যে লাইনে আছেন...";
             return; 
          }

          const newMatchRef = database.ref('matches').push();
          currentMatchId = newMatchRef.key;

          newMatchRef.set({
            player1: opponentId,
            player1_tiktok: opponentData.tiktokId,
            player1_followed: false,
            player1_received: 'waiting',
            player2: myId,
            player2_tiktok: myTikTok,
            player2_followed: false,
            player2_received: 'waiting',
            status: 'active'
          }).then(() => {
            database.ref('queue/' + opponentId).remove();
            initMatchSession(currentMatchId);
          });

        } else {
          database.ref('queue/' + myId).set({
            tiktokId: myTikTok
          });

          database.ref('matches').orderByChild('player1').equalTo(myId).on('child_added', (matchSnapshot) => {
            const match = matchSnapshot.val();
            if (match && match.player1 === myId) {
              currentMatchId = matchSnapshot.key;
              database.ref('matches').orderByChild('player1').equalTo(myId).off('child_added');
              initMatchSession(currentMatchId);
            }
          });
        }
      });
    }

    // --- ৪. লাইভ ম্যাচ সেশন হ্যান্ডলার (দ্বিমুখী এক্সচেঞ্জ সংস্করণ) ---
    function initMatchSession(matchId) {
      document.getElementById('searching-text').classList.add('hidden');
      showScreen('screen-match');

      // বাটনগুলো রিসেট করা
      document.getElementById('btn-submit-follow').disabled = false;
      document.getElementById('btn-recv-yes').disabled = false;
      document.getElementById('btn-recv-no').disabled = false;

      matchListenerRef = database.ref('matches/' + matchId);
      matchListenerRef.on('value', (snapshot) => {
        const match = snapshot.val();
        if (!match) return;

        // রোল চেক
        if (match.player1 === myId) {
          myRole = 'player1';
        } else if (match.player2 === myId) {
          myRole = 'player2';
        }

        // UI ও টিকিটক লিংক আপডেট
        if (myRole === 'player1') {
          document.getElementById('p1-label').innerText = "আপনি (Player 1)";
          document.getElementById('p2-label').innerText = "বিপক্ষ (Player 2)";
          document.getElementById('p1-name').innerText = "@" + myTikTok;
          document.getElementById('p2-name').innerText = "@" + match.player2_tiktok;
          document.getElementById('tiktok-link').href = "https://www.tiktok.com/@" + match.player2_tiktok;

          // নিজের দেওয়া বাটনের স্টেট লক করা
          if(match.player1_followed) document.getElementById('btn-submit-follow').disabled = true;
          if(match.player1_received !== 'waiting') {
            document.getElementById('btn-recv-yes').disabled = true;
            document.getElementById('btn-recv-no').disabled = true;
          }
        } else {
          document.getElementById('p1-label').innerText = "বিপক্ষ (Player 1)";
          document.getElementById('p2-label').innerText = "আপনি (Player 2)";
          document.getElementById('p1-name').innerText = "@" + match.player1_tiktok;
          document.getElementById('p2-name').innerText = "@" + myTikTok;
          document.getElementById('tiktok-link').href = "https://www.tiktok.com/@" + match.player1_tiktok;

          // নিজের দেওয়া বাটনের স্টেট লক করা
          if(match.player2_followed) document.getElementById('btn-submit-follow').disabled = true;
          if(match.player2_received !== 'waiting') {
            document.getElementById('btn-recv-yes').disabled = true;
            document.getElementById('btn-recv-no').disabled = true;
          }
        }

        // লাইভ স্ট্যাটাস মেসেজ রেন্ডারিং
        let statusText = "একে অপরকে ফলো করে কনফর্ম করুন।";
        if (match.player1_followed && !match.player2_followed) {
          statusText = "প্লেয়ার ১ ফলো করেছে, প্লেয়ার ২ এর ফলো করার অপেক্ষা...";
        } else if (!match.player1_followed && match.player2_followed) {
          statusText = "প্লেয়ার ২ ফলো করেছে, প্লেয়ার ১ এর ফলো করার অপেক্ষা...";
        } else if (match.player1_followed && match.player2_followed) {
          statusText = "উভয়েই ফলো করেছেন! এখন চেক করে 'ফলো পেয়েছি' বাটনে চাপুন।";
        }
        document.getElementById('match-status-text').innerText = statusText;

        // ম্যাচ শেষ হওয়ার শর্তসমূহ পরীক্ষা
        if (match.status === 'completed') {
          endMatchFlow("ম্যাচ সফল! উভয়ই একে অপরকে ফলো করেছেন। +১ পয়েন্ট যোগ হয়েছে।", true);
        } else if (match.status === 'disputed') {
          endMatchFlow("ম্যাচ বাতিল! কোনো একজন ফলো পাননি বলে ক্লেইম করেছেন।", false);
        }
      });
    }

    // --- ৫. অ্যাকশন ফাংশনস ---

    // আমি ফলো করেছি বাটন
    function clickFollowed() {
      let updateData = {};
      updateData[myRole + '_followed'] = true;
      database.ref('matches/' + currentMatchId).update(updateData);
    }

    // ফলো পেয়েছি / পাইনি বাটন
    function clickReceived(isReceived) {
      const matchRef = database.ref('matches/' + currentMatchId);
      
      matchRef.once('value').then((snapshot) => {
        const match = snapshot.val();
        if(!match) return;

        let currentStatus = isReceived ? 'yes' : 'no';
        let updateData = {};
        updateData[myRole + '_received'] = currentStatus;

        // যদি কেউ 'ফলো পাইনি' (no) সিলেক্ট করে, ম্যাচ সাথে সাথে ডিস্পিউট (বাতিল) হবে
        if (!isReceived) {
          updateData['status'] = 'disputed';
        } else {
          // যদি আমি 'yes' দিই, তাহলে দেখতে হবে অন্যজনও ইতিমধ্যে 'yes' দিয়েছে কিনা
          let opponentRole = (myRole === 'player1') ? 'player2' : 'player1';
          if (match[opponentRole + '_received'] === 'yes') {
            updateData['status'] = 'completed';
          }
        }

        matchRef.update(updateData);
      });
    }

    // --- ৬. ম্যাচ সমাপ্তি এবং পয়েন্ট বণ্টন ---
    function endMatchFlow(message, isSuccess) {
      if(matchListenerRef) {
        matchListenerRef.off();
      }

      if (isSuccess) {
        updateUserPointsInDB(myPoints + 1);
      } else {
        // ফলো না পেলে কোনো পয়েন্ট যোগ হবে না (চাইলে এখানে মাইনাস পয়েন্ট লজিকও দিতে পারেন)
        updateUserPointsInDB(myPoints); 
      }
      
      alert(message);
      currentMatchId = null;
      myRole = "";
      showScreen('screen-lobby');
    }
  </script>
</body>
</html>
