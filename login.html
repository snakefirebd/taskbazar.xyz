            opacity: 0.9;

        /* Toast Notification */
        #toast {

</head>
<body>

    <!-- Audio for Click Effects -->
    <audio id="clickSound" src="https://www.fesliyanstudios.com/play-mp3/387" preload="auto"></audio>

    <!-- Deep Preloader -->
    <div id="new-preloader">
        <div class="loader-content">
            <div class="spinner"></div>
            <div class="loader-text">TaskBazar</div>
        </div>
    </div>

    <!-- Topbar -->
    <div class="custom-topbar">
        <a id="navLoginBtn" class="topbar-btn btn-login-top">লগইন</a>
        <div class="topbar-logo">TaskBazar</div>
        <a id="navRegBtn" class="topbar-btn btn-reg-top">রেজিস্টার</a>
    </div>

    <!-- Auth Container (Login / Register) -->
    <div class="login-container" id="authArea">
        <form class="login-card" id="authForm">
            <h4 id="formTitle">একাউন্ট লগইন</h4>

            <!-- Email Field -->
            <div class="form-group">
                <i class="fa-solid fa-envelope"></i>
                <input class="form-control" type="email" id="userEmail" placeholder="ইমেইল এড্রেস" required>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <i class="fa-solid fa-shield-halved"></i>
                <input class="form-control" type="password" id="userPassword" placeholder="পাসওয়ার্ড" required>
            </div>

            <!-- Extra Options -->
            <div class="d-flex justify-content-between align-items-center mb-4" id="loginOptions" style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 13px;">
                <label style="cursor:pointer; color: #555;"><input type="checkbox"> মনে রাখুন</label>
                <a href="#" style="color:var(--deep-green); text-decoration:none; font-weight:600;">ভুলে গেছেন?</a>
            </div>

            <button class="btn-submit" type="submit" id="submitBtn">লগইন করুন</button>
            
            <p style="margin-top: 20px; font-size: 14px; color: #666;" id="toggleText">
                একাউন্ট নেই? <a href="#" id="toggleModeBtn" style="color: var(--primary-green); font-weight: bold; text-decoration: none;">রেজিস্টার করুন</a>
            </p>
        </form>
    </div>

    <!-- Toast Notification -->
    <div id="toast">বার্তা</div>

    <!-- Confetti Script -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- UI & Animation Scripts -->
    <script>
        // 1. Preloader Timeout
        window.addEventListener('load', function() {
            const loader = document.getElementById('new-preloader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1000);
        });

        // 2. Click Sound
        function playClick() {
            const sound = document.getElementById("clickSound");
            sound.currentTime = 0;
            sound.play().catch(() => {});
        }
        document.addEventListener("click", playClick);

        // 3. Confetti Effect
        function triggerConfetti() {
            const duration = 2 * 1000;
            const animationEnd = Date.now() + duration;
            const interval = setInterval(function() {
                if (Date.now() > animationEnd) return clearInterval(interval);
                confetti({
                    startVelocity: 30, spread: 100, ticks: 60, zIndex: 1000,
                    origin: { y: 0.6 },
                    colors: ['#1ab394', '#ffffff', '#0d6d5a']
                });
            }, 250);
        }

        // Toast Function
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }
    </script>

    <!-- Firebase Logic (Realtime DB) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgFaTrHW7Grp_Q22p6KNcHZxaEujHsLsE",
            authDomain: "exchange-project-d4028.firebaseapp.com",
            databaseURL: "https://exchange-project-d4028-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "exchange-project-d4028",
            storageBucket: "exchange-project-d4028.firebasestorage.app",
            messagingSenderId: "313976742479",
            appId: "1:313976742479:web:45951b360d875c4768c03a",
            measurementId: "G-PQMFYZS958"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app); 

        // DOM Elements
        const authForm = document.getElementById('authForm');
        const userEmail = document.getElementById('userEmail');
        const userPassword = document.getElementById('userPassword');
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const loginOptions = document.getElementById('loginOptions');
        
        const authArea = document.getElementById('authArea');
        const navLoginBtn = document.getElementById('navLoginBtn');
        const navRegBtn = document.getElementById('navRegBtn');

        let isLoginMode = true; 
        let isRedirecting = false; // রিডাইরেক্ট হওয়ার সময় চেক করার জন্য

        // UI Toggle Function
        function setMode(mode) {
            isLoginMode = (mode === 'login');
            if (isLoginMode) {
                formTitle.textContent = "একাউন্ট লগইন";
                submitBtn.textContent = "লগইন করুন";
                loginOptions.style.display = "flex";
                toggleText.innerHTML = 'একাউন্ট নেই? <a href="#" id="toggleModeBtn" style="color: var(--primary-green); font-weight: bold; text-decoration: none;">রেজিস্টার করুন</a>';
            } else {
                formTitle.textContent = "নতুন একাউন্ট খুলুন";
                submitBtn.textContent = "রেজিস্টার করুন";
                loginOptions.style.display = "none";
                toggleText.innerHTML = 'আগে থেকে একাউন্ট আছে? <a href="#" id="toggleModeBtn" style="color: var(--primary-green); font-weight: bold; text-decoration: none;">লগইন করুন</a>';
            }
            
            document.getElementById('toggleModeBtn').addEventListener('click', (e) => {
                e.preventDefault();
                setMode(isLoginMode ? 'register' : 'login');
            });
        }

        // Initialize Modes
        setMode('login');
        navLoginBtn.addEventListener('click', () => setMode('login'));
        navRegBtn.addEventListener('click', () => setMode('register'));

        // Auth State Listener
        onAuthStateChanged(auth, (user) => {
            if (user && !isRedirecting) {
                // ইউজার আগে থেকেই লগইন করা থাকলে সরাসরি ড্যাশবোর্ডে যাবে
                window.location.href = 'dashboard.html';
            } else if (!user) {
                // ইউজার লগআউট করা থাকলে ফর্ম দেখান
                authArea.style.display = 'flex';
                navLoginBtn.style.display = 'block';
                navRegBtn.style.display = 'block';
            }
        });

        // Form Submit Action
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = userEmail.value.trim();
            const password = userPassword.value.trim();

            if (!email || !password) return;

            submitBtn.disabled = true;
            submitBtn.textContent = "অপেক্ষা করুন...";

            try {
                if (isLoginMode) {
                    // লগইন
                    await signInWithEmailAndPassword(auth, email, password);
                    isRedirecting = true; // ফ্ল্যাগ ট্রু করা হলো যাতে AuthListener কনফ্লিক্ট না করে
                    showToast("সফলভাবে লগইন হয়েছে!");
                    triggerConfetti();
                    
                    // ১.৫ সেকেন্ড পর ড্যাশবোর্ডে পাঠিয়ে দেবে
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);

                } else {
                    // রেজিস্টার
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    // ইউজারের তথ্য Realtime Database এ সেভ হবে
                    const userRef = ref(db, `users/${user.uid}/profile`);
                    await set(userRef, {
                        email: user.email,
                        createdAt: serverTimestamp(),
                        platform: "TaskBazar"
                    });
                    
                    isRedirecting = true;
                    showToast("সফলভাবে একাউন্ট তৈরি হয়েছে!");
                    triggerConfetti();
                    
                    // ১.৫ সেকেন্ড পর ড্যাশবোর্ডে পাঠিয়ে দেবে
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                let errMsg = "একটি সমস্যা হয়েছে। আবার চেষ্টা করুন।";
                if(error.code === 'auth/invalid-credential') errMsg = "ইমেইল বা পাসওয়ার্ড ভুল।";
                if(error.code === 'auth/email-already-in-use') errMsg = "এই ইমেইল দিয়ে ইতিমধ্যে একাউন্ট আছে।";
                if(error.code === 'auth/weak-password') errMsg = "পাসওয়ার্ড অন্তত ৬ অক্ষরের হতে হবে।";
                showToast(errMsg);
                submitBtn.disabled = false;
                submitBtn.textContent = isLoginMode ? "লগইন করুন" : "রেজিস্টার করুন";
            }
        });
    </script>
</body>
</html>
