<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Tracker App - Premium Navigation</title>
    
    <script src="https://cdn.tailwindcss.com"> </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <style>
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        #bottom-sheet { 
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        #bottom-sheet.show { 
            transform: translateY(0); 
        }

        .leaflet-control-attribution, .leaflet-routing-container {
            display: none !important;
        }
    </style>
</head>
<body class="bg-gray-100 relative overflow-hidden font-sans">

    <div id="map"></div>

    <div id="routing-instruction" class="hidden absolute top-10 left-1/2 transform -translate-x-1/2 bg-gray-900/90 backdrop-blur-sm text-white px-8 py-3 rounded-full z-[1000] shadow-[0_10px_25px_rgba(0,0,0,0.3)] text-sm font-semibold tracking-wide text-center w-max border border-gray-700">
        <i class="fa-solid fa-map-location-dot mr-2 text-blue-400"></i> Tap anywhere to set destination
    </div>

    <div class="absolute bottom-32 right-6 flex flex-col gap-4 z-[1000]">
        
        <button id="directions-btn" class="bg-white hover:bg-gray-50 text-blue-600 w-14 h-14 rounded-2xl shadow-[0_8px_20px_rgba(37,99,235,0.2)] text-xl focus:outline-none flex justify-center items-center transition-all transform hover:scale-110 active:scale-95 border border-gray-100">
            <i class="fa-solid fa-route"></i>
        </button>

        <button id="my-location-btn" class="bg-white hover:bg-gray-50 text-gray-700 w-14 h-14 rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.15)] text-xl focus:outline-none flex justify-center items-center transition-all transform hover:scale-110 active:scale-95 border border-gray-100">
            <i class="fa-solid fa-location-crosshairs"></i>
        </button>
    </div>

    <button id="report-btn" class="absolute bottom-10 right-6 bg-gradient-to-tr from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white w-16 h-16 rounded-full shadow-[0_10px_25px_rgba(79,70,229,0.5)] text-2xl z-[1000] focus:outline-none flex justify-center items-center transition-all transform hover:scale-110 active:scale-95 ring-4 ring-white/50">
        <i class="fa-solid fa-triangle-exclamation"></i>
    </button>

    <div id="bottom-sheet" class="absolute bottom-0 left-0 w-full bg-white rounded-t-[2.5rem] shadow-[0_-15px_40px_rgba(0,0,0,0.2)] z-[1050] p-8 pb-10">
        
        <div class="w-16 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>

        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-extrabold text-gray-800 tracking-tight">Report Condition</h2>
            <button id="close-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-600 w-10 h-10 rounded-full flex items-center justify-center text-lg transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="flex flex-col gap-4">
            <button onclick="submitReport('High')" class="relative overflow-hidden bg-gradient-to-r from-red-500 to-rose-600 text-white py-4 px-6 rounded-2xl text-xl font-bold shadow-[0_8px_20px_rgba(225,29,72,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-between group">
                <span class="flex items-center gap-4"><i class="fa-solid fa-car-burst text-2xl group-hover:-rotate-12 transition-transform"></i> Heavy Traffic</span>
                <i class="fa-solid fa-chevron-right opacity-50"></i>
            </button>

            <button onclick="submitReport('Medium')" class="relative overflow-hidden bg-gradient-to-r from-amber-500 to-orange-500 text-white py-4 px-6 rounded-2xl text-xl font-bold shadow-[0_8px_20px_rgba(245,158,11,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-between group">
                <span class="flex items-center gap-4"><i class="fa-solid fa-car-side text-2xl group-hover:translate-x-1 transition-transform"></i> Moderate Traffic</span>
                <i class="fa-solid fa-chevron-right opacity-50"></i>
            </button>

            <button onclick="submitReport('Low')" class="relative overflow-hidden bg-gradient-to-r from-emerald-400 to-teal-500 text-white py-4 px-6 rounded-2xl text-xl font-bold shadow-[0_8px_20px_rgba(16,185,129,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-between group">
                <span class="flex items-center gap-4"><i class="fa-solid fa-road-circle-check text-2xl group-hover:scale-110 transition-transform"></i> Clear Road</span>
                <i class="fa-solid fa-chevron-right opacity-50"></i>
            </button>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDgFaTrHW7Grp_Q22p6KNcHZxaEujHsLsE",
            authDomain: "exchange-project-d4028.firebaseapp.com",
            databaseURL: "https://exchange-project-d4028-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "exchange-project-d4028"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map;
        let userMarker = null; 
        let routingControl = null; 
        let destinationMarker = null; 
        let isRoutingMode = false; 

        let currentLat = null;
        let currentLng = null;
        let isFirstLoad = true; // প্রথমবার ম্যাপ ইউজারের লোকেশনে নেওয়ার জন্য

        function initMap() {
            // শুরুতে ডিফল্ট একটি লোকেশন দিয়ে ম্যাপ তৈরি করা
            const defaultLocation = [21.4225, 39.8262]; 
            map = L.map('map', { zoomControl: false }).setView(defaultLocation, 14);

            L.tileLayer('http://mt0.google.com/vt/lyrs=m&hl=en&x={x}&y={y}&z={z}&scale=2', {
                maxZoom: 21, 
                maxNativeZoom: 20, 
                tileSize: 512,      
                zoomOffset: -1      
            }).addTo(map);

        // ==========================================
        //  রিয়েল-টাইমে ট্রাফিক রিপোর্ট ম্যাপে দেখানোর লজিক
        // ==========================================
        function loadReports() {
            // Firebase Realtime Database থেকে রিয়েল-টাইমে নতুন রিপোর্ট আসা মাত্রই ধরবে
            database.ref('traffic_reports').on('child_added', (snapshot) => {
                const data = snapshot.val();
                
                let bgColor = '';
                let iconClass = '';

                // রিপোর্টের ধরন (Severity) অনুযায়ী পিনের কালার ও আইকন সেট করা
                if (data.severity === 'High') {
                    bgColor = 'bg-red-500 shadow-[0_0_20px_rgba(239,68,68,0.8)]'; // লাল রং (Heavy Traffic)
                    iconClass = 'fa-car-burst';
                } else if (data.severity === 'Medium') {
                    bgColor = 'bg-orange-500 shadow-[0_0_20px_rgba(249,115,22,0.8)]'; // কমলা রং (Moderate Traffic)
                    iconClass = 'fa-car-side';
                } else if (data.severity === 'Low') {
                    bgColor = 'bg-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.8)]'; // সবুজ রং (Clear Road)
                    iconClass = 'fa-road-circle-check';
                }

                // লিফলেটের জন্য কাস্টম প্রফেশনাল আইকন তৈরি
                const trafficIcon = L.divIcon({
                    className: 'custom-traffic-pin',
                    html: `<div class="${bgColor} w-8 h-8 rounded-full border-[3px] border-white flex items-center justify-center transform transition-transform hover:scale-110">
                               <i class="fa-solid ${iconClass} text-white text-[14px]"></i>
                           </div>`,
                    iconSize: [32, 32],
                    iconAnchor: [16, 16] // পিনের মাঝখানটা ঠিক রাস্তার ওপর পয়েন্ট করবে
                });

                // ম্যাপে পিন বসানো এবং ক্লিক করলে পপআপ (Popup) দেখানো
                L.marker([data.lat, data.lng], { icon: trafficIcon })
                 .addTo(map)
                 .bindPopup(`
                    <div class="text-center p-1">
                        <p class="font-bold text-gray-800 text-sm mb-1">${data.severity} Traffic Reported</p>
                        <p class="text-xs text-gray-500">Just now</p>
                    </div>
                 `);
            });
        }


            // ম্যাপে ক্লিক করে রুট তৈরির কোড
            map.on('click', function(e) {
                if (isRoutingMode && currentLat && currentLng) {
                    const destLat = e.latlng.lat;
                    const destLng = e.latlng.lng;

                    instructionBar.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Calculating route...'; 

                    const destIcon = L.divIcon({
                        className: 'dest-pin',
                        html: `<div class="bg-red-600 w-5 h-5 rounded-full border-2 border-white shadow-[0_0_15px_rgba(220,38,38,0.8)]"></div>`,
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });
                    destinationMarker = L.marker([destLat, destLng], { icon: destIcon }).addTo(map);

                    routingControl = L.Routing.control({
                        waypoints: [
                            L.latLng(currentLat, currentLng),
                            L.latLng(destLat, destLng)
                        ],
                        createMarker: function() { return null; }, 
                        routeWhileDragging: false,
                        addWaypoints: false,
                        fitSelectedRoutes: true, 
                        show: false, 
                        lineOptions: {
                            styles: [
                                {
                                    color: '#1a73e8', 
                                    opacity: 0.9, 
                                    weight: 7, 
                                    lineCap: 'round', 
                                    lineJoin: 'round' 
                                }
                            ]
                        }
                    }).addTo(map);

                    isRoutingMode = false;
                    setTimeout(() => {
                        instructionBar.classList.add('hidden');
                    }, 2000);
                }
            });

            // ম্যাপ লোড হওয়ার সাথে সাথেই অটোমেটিক লোকেশন ট্র্যাকিং শুরু করা
            startAutoTracking();
        }

        // অটোমেটিক লোকেশন ট্র্যাকিং ফাংশন
        function startAutoTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;

                    // যদি অ্যাপে প্রথমবার ঢুকে থাকে, ম্যাপ সরাসরি ইউজারের লোকেশনে চলে যাবে
                    if (isFirstLoad) {
                        map.flyTo([currentLat, currentLng], 17, { animate: true, duration: 1.5 });
                        isFirstLoad = false;
                    }

                    // ইউজারের পিন আপডেট করা (গাড়ি চললে পিনও নড়বে)
                    if (userMarker) {
                        userMarker.setLatLng([currentLat, currentLng]); 
                    } else {
                        const userIcon = L.divIcon({
                            className: 'user-location-pin',
                            html: `<div class="bg-blue-600 w-5 h-5 rounded-full border-4 border-white shadow-[0_0_20px_rgba(37,99,235,0.8)] animate-pulse"></div>`,
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        });
                        userMarker = L.marker([currentLat, currentLng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
                    }
                }, (error) => {
                    console.log("GPS signal is weak or disabled.");
                }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
            }
        }

        window.onload = initMap;

        // UI Controls
        const reportBtn = document.getElementById('report-btn');
        const bottomSheet = document.getElementById('bottom-sheet');
        const closeBtn = document.getElementById('close-btn');
        const myLocationBtn = document.getElementById('my-location-btn');
        const directionsBtn = document.getElementById('directions-btn');
        const instructionBar = document.getElementById('routing-instruction');

        reportBtn.addEventListener('click', () => bottomSheet.classList.add('show'));
        closeBtn.addEventListener('click', () => bottomSheet.classList.remove('show'));

        // My Location Button (ম্যানুয়াল রিফ্রেশের জন্য)
        myLocationBtn.addEventListener('click', () => {
            if (currentLat && currentLng) {
                map.flyTo([currentLat, currentLng], 17, { animate: true, duration: 1 });
            } else {
                alert("Location not found yet. Please ensure GPS is on.");
            }
        });

        directionsBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            
            if (!currentLat || !currentLng) {
                alert("আপনার জিপিএস লোকেশন এখনো পাওয়া যায়নি। দয়া করে জিপিএস অন করুন এবং একটু অপেক্ষা করুন।");
                return;
            }

            isRoutingMode = true;
            instructionBar.innerHTML = '<i class="fa-solid fa-map-location-dot mr-2 text-blue-400"></i> Tap anywhere to set destination';
            instructionBar.classList.remove('hidden'); 
            
            if(routingControl) map.removeControl(routingControl);
            if(destinationMarker) map.removeLayer(destinationMarker);
        });

        function submitReport(severity) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy; 

                    if (accuracy > 1000) {
                        alert("আপনার জিপিএস সিগন্যাল দুর্বল এবং সঠিক লোকেশন ধরতে পারছে না। দয়া করে খোলা জায়গায় গিয়ে চেষ্টা করুন।");
                        return; 
                    }

                    database.ref('traffic_reports').push().set({
                        lat: lat,
                        lng: lng,
                        severity: severity,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    }).then(() => {
                        alert("রিপোর্ট সফলভাবে জমা হয়েছে!");
                        bottomSheet.classList.remove('show'); 
                        map.flyTo([lat, lng], 17, { animate: true, duration: 1.5 }); 
                    }).catch((error) => {
                        alert("Error saving report: " + error.message);
                    });

                }, (error) => {
                    alert("লোকেশন পেতে সমস্যা হচ্ছে। জিপিএস অন আছে কিনা চেক করুন।");
                }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }); 
            }
        }

    </script>
</body>
</html>
